name: Reusable Scorecards

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      repository_private:
        required: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: ${{ inputs.repository_private == false }}
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Enforce scorecard threshold policy
        run: |
          python3 scripts/check_scorecard_threshold.py \
            --repo "${{ inputs.repository }}" \
            --allow-unavailable

      - name: Update scorecard history
        run: python3 scripts/update_scorecard_history.py

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: scorecard-results
          path: |
            results.sarif
            docs/reports/scorecard_threshold_audit.json
            docs/reports/scorecard_history.json
            docs/reports/scorecard_history.md
          retention-days: 30

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@9e907b5e64f6b83e7804b09294d44122997950d6 # v4.32.3
        with:
          sarif_file: results.sarif

      - name: Generate run summary
        if: ${{ failure() || cancelled() }}
        run: |
          python3 scripts/generate_run_summary.py \
            --phase CP4-A \
            --cycle-id CHIMERA-V2-RESEARCH-AND-EXECUTION-2026-02-15 \
            --repo "${{ inputs.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --head-sha "${{ github.sha }}" \
            --job-status "${{ job.status }}" \
            --failure-taxonomy "$(python3 scripts/select_failure_taxonomy.py --workflow "${{ github.workflow }}" --job "${{ github.job }}")" \
            --failing-job "analysis" \
            --failing-step "see job logs" \
            --next-owner "lane-policy" \
            --incident-id "CUTOVER-${{ github.run_id }}" \
            --output-dir run_summary

      - name: Validate run summary
        if: ${{ failure() || cancelled() }}
        run: python3 scripts/validate_run_summary.py --path run_summary/run_summary.json

      - name: Upload run summary artifact
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: run-summary-scorecards
          path: |
            run_summary/run_summary.json
            run_summary/run_summary.md
          retention-days: 7

      - name: Cancellation-safe cleanup dry-run
        if: ${{ cancelled() }}
        run: python3 scripts/clean_cutover_artifacts.py --retention-class short --dry-run
