name: Reusable Forge Gates

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  forge-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Workflow script-injection lint
        run: python3 scripts/check_workflow_script_injection.py

      - name: Generate dependency snapshot + SBOM
        run: python3 scripts/generate_dependency_inventory.py --output-dir docs/reports

      - name: Validate dependency inventory/forge policy
        run: python3 scripts/check_dependency_inventory_forge_policy.py

      - name: Upload forge-gates reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: forge-gates-reports
          path: |
            docs/reports/dependency_snapshot_requirements.txt
            docs/reports/dependency_snapshot.json
            docs/reports/dependency_sbom.spdx.json
          retention-days: 30

      - name: Generate run summary
        if: ${{ failure() || cancelled() }}
        run: |
          python3 scripts/generate_run_summary.py \
            --phase CP4-A \
            --cycle-id CHIMERA-V2-RESEARCH-AND-EXECUTION-2026-02-15 \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --head-sha "${{ github.sha }}" \
            --job-status "${{ job.status }}" \
            --failure-taxonomy "$(python3 scripts/select_failure_taxonomy.py --workflow "${{ github.workflow }}" --job "${{ github.job }}")" \
            --failing-job "forge-gates" \
            --failing-step "see job logs" \
            --next-owner "lane-governance" \
            --incident-id "CUTOVER-${{ github.run_id }}" \
            --output-dir run_summary

      - name: Validate run summary
        if: ${{ failure() || cancelled() }}
        run: python3 scripts/validate_run_summary.py --path run_summary/run_summary.json

      - name: Upload run summary artifact
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: run-summary-forge-gates
          path: |
            run_summary/run_summary.json
            run_summary/run_summary.md
          retention-days: 7
