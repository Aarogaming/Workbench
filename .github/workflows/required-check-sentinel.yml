name: Required Check Sentinel

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - name: Always pass sentinel
        run: echo "required-check-sentinel=pass"
