name: CodeQL Actions Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL actions analysis
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        language: [actions]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        with:
          category: "/language:${{ matrix.language }}"

      - name: Generate run summary
        if: ${{ failure() || cancelled() }}
        run: |
          python3 scripts/generate_run_summary.py \
            --phase CP4-A \
            --cycle-id CHIMERA-V2-RESEARCH-AND-EXECUTION-2026-02-15 \
            --repo "${{ github.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --head-sha "${{ github.sha }}" \
            --job-status "${{ job.status }}" \
            --failure-taxonomy "$(python3 scripts/select_failure_taxonomy.py --workflow "${{ github.workflow }}" --job "${{ github.job }}")" \
            --failing-job "analyze" \
            --failing-step "see job logs" \
            --next-owner "lane-security" \
            --incident-id "CUTOVER-${{ github.run_id }}" \
            --output-dir run_summary

      - name: Validate run summary
        if: ${{ failure() || cancelled() }}
        run: python3 scripts/validate_run_summary.py --path run_summary/run_summary.json

      - name: Upload run summary artifact
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: run-summary-codeql-actions-security
          path: |
            run_summary/run_summary.json
            run_summary/run_summary.md
          retention-days: 7
