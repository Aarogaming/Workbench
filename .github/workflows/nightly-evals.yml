name: Nightly Evals

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  nightly-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install test/runtime dependencies
        run: python3 -m pip install --upgrade pip pytest requests

      - name: Unit tests
        run: pytest -q

      - name: Eval report
        run: python3 scripts/eval_report.py --baseline evals/baselines/main.json

      - name: Attest eval artifacts (public repos)
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: |
            docs/reports/eval_report.json
            docs/reports/eval_report.md

      - name: Upload eval artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-eval-report
          path: |
            docs/reports/eval_report.json
            docs/reports/eval_report.md
