name: Check File Sizes

on:
  push:
  pull_request:

jobs:
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Secret hygiene guard
        run: python scripts/check_secret_hygiene.py --all --strict
      - name: Check git file sizes
        run: python scripts/check_git_size.py
      - name: Plugin contract audit
        run: python3 scripts/check_plugin_contracts.py
      - name: Workflow pinning audit
        run: python3 scripts/check_workflow_pinning.py
      - name: Workflow pinning exceptions review
        run: python3 scripts/check_workflow_pinning_exceptions.py
      - name: Workspace index audit (enforced drift)
        run: python scripts/validate_workspace_index.py --suite-root .. --strict-enforced-only --ignore-cross-repo-warnings --ignore-submodule-dirty --ignore-submodule-ahead
