name: Reusable Policy Review

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      repository_private:
        required: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-policy-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Workflow pinning audit
        run: python3 scripts/check_workflow_pinning.py

      - name: Workflow pinning exceptions review
        run: python3 scripts/check_workflow_pinning_exceptions.py --warn-days 21 --fail-on-warning

      - name: Scorecard threshold review
        if: ${{ inputs.repository_private == false }}
        run: |
          python3 scripts/check_scorecard_threshold.py \
            --repo "${{ inputs.repository }}" \
            --allow-unavailable

      - name: Update scorecard history
        if: ${{ inputs.repository_private == false }}
        run: python3 scripts/update_scorecard_history.py

      - name: Upload policy review artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: workflow-policy-reports
          path: |
            docs/reports/workflow_pinning_audit.json
            docs/reports/workflow_pinning_exceptions_review.json
            docs/reports/scorecard_threshold_audit.json
            docs/reports/scorecard_history.json
            docs/reports/scorecard_history.md
          retention-days: 30

      - name: Generate run summary
        if: ${{ failure() || cancelled() }}
        run: |
          python3 scripts/generate_run_summary.py \
            --phase CP4-A \
            --cycle-id CHIMERA-V2-RESEARCH-AND-EXECUTION-2026-02-15 \
            --repo "${{ inputs.repository }}" \
            --workflow "${{ github.workflow }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --head-sha "${{ github.sha }}" \
            --job-status "${{ job.status }}" \
            --failure-taxonomy "$(python3 scripts/select_failure_taxonomy.py --workflow "${{ github.workflow }}" --job "${{ github.job }}")" \
            --failing-job "workflow-policy-review" \
            --failing-step "see job logs" \
            --next-owner "lane-policy" \
            --incident-id "CUTOVER-${{ github.run_id }}" \
            --output-dir run_summary

      - name: Validate run summary
        if: ${{ failure() || cancelled() }}
        run: python3 scripts/validate_run_summary.py --path run_summary/run_summary.json

      - name: Upload run summary artifact
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: run-summary-policy-review
          path: |
            run_summary/run_summary.json
            run_summary/run_summary.md
          retention-days: 7

      - name: Cancellation-safe cleanup dry-run
        if: ${{ cancelled() }}
        run: python3 scripts/clean_cutover_artifacts.py --retention-class short --dry-run
