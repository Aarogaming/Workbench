version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-version:
        applies-to: version-updates
        patterns:
          - "*"
